[stepper_x]
step_pin: ar54
dir_pin: ar55
enable_pin: !ar38
microsteps: 16
rotation_distance: 40
endstop_pin: ^!ar3
position_endstop: 0
position_max: 310
homing_speed: 40.0

[stepper_y]
step_pin: ar60
dir_pin: ar61
enable_pin: !ar56
microsteps: 16
rotation_distance: 40
endstop_pin: ^!ar14
position_endstop: 0
position_max: 310
homing_speed: 40
homing_positive_dir: false

[stepper_z]
step_pin: ar46
dir_pin: !ar48
enable_pin: !ar62
microsteps: 16
rotation_distance: 8
endstop_pin: ^!ar18
#position_endstop: 0
position_min: -3
position_max: 400
homing_speed: 30
second_homing_speed: 1

[stepper_z1]
step_pin: ar36
dir_pin: !ar34
enable_pin: !ar30
microsteps: 16
rotation_distance: 8

[extruder]
step_pin: ar26
dir_pin: !ar28        
#Changed the extruder direction by adding a ! on ar28 bc i have a bmg extruder, if not on reverse direction delete the !
enable_pin: !ar24
microsteps: 16
rotation_distance: 7.720
#adjusted the E-step for my extruder check online for how to do it so
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ar10
sensor_type: Generic 3950
sensor_pin: analog13
min_extrude_temp: 160
#i've lowered the temp sensor min extrude temp for  ez cold pulls and for some pla that i printing at 175, default was 190
min_temp: 5
max_temp: 300
max_extrude_only_distance: 500
max_extrude_cross_section: 2.0

[heater_bed]
heater_pin: ar8
sensor_type: Generic 3950
#changed the stock temp sensor for a generic 100k b3950 so if u have an other sensor check online for what value to change there
sensor_pin: analog14
min_temp: 5
max_temp: 150

[fan]
pin: ar9
kick_start_time: 0.500

[heater_fan my_nozzle_fan]
pin:ar7
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[mcu]
#make sure this reflects your serial port you found when flashing klipper
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0


[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 3000
max_z_velocity: 50
max_z_accel: 100
square_corner_velocity: 5

[bed_screws]
screw1: 55,55
screw1_name: front left
screw2: 255,55
screw2_name: front right
screw3: 255,255
screw3_name: back right
screw4: 55,255
screw4_name: back left
speed: 100.0

[bed_mesh]               #to use MBL, Issue BED_MESH_CALIBRATE METHOD=manual then follow the prompts.
mesh_min: 40,20
mesh_max: 270,270
probe_count: 5,5
fade_start: 1.0
fade_end: 10.0

[screws_tilt_adjust]
screw1: 22,83
screw1_name: front left
screw2: 222,83
screw2_name: front right
screw3: 22,283
screw3_name: back left
screw4: 222,283
screw4_name: back right
speed: 100.0
screw_thread: CW-M5

[gcode_macro START_PRINT]			
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(210)|float %}
    #SET_GCODE_OFFSET Z=-0.080
    #SET_GCODE_OFFSET Z=+0.090
    #SET_GCODE_OFFSET Z=+0.010
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp - 1}
    # Home the printer
	G29 				 		  						 
    # Use absolute coordinates
    G90
    # Wait for hotend temp
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
    G1 X0 Y0 Z30 F3000
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} MAXIMUM={extruder_temp + 2}
    # Move the nozzle near the bed
    G1 X0 Y0 Z5 F3000
    # Move the nozzle very close to the bed
    G1 Z0.15 F300
    G92 E0 ;Reset Extruder
    
    G1 X20 Y5 Z0.3 F5000.0			   
    G1 Z0.3 F1000 			    
    G1 X50 Y5 F1500.0 E5 			   
    G1 X50 Y5.3 Z0.3 F5000.0			    
    G1 X5.3  Y5.3 Z0.3 F1500.0 E10 			

    G21 ; set units to millimeters
    G90 ; use absolute coordinates
    M83 ; use relative distances for extrusion
    G92 E0
    SKEW_PROFILE LOAD=CaliFlower


[gcode_macro END_PRINT]
gcode:
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Move nozzle away from print while retracting
    G91
    G1 Z20 X10 Y10 E-3 F3000
    G90
    G1 Y200 F6000
    # Disable steppers
    M84
    SET_SKEW CLEAR=1

[pause_resume]
recover_velocity: 50.

